name: First-call troubleshooting
description: Get help with the first Claude Code API call.
title: "[First call]: "
labels: ["first-call"]
body:
  - type: markdown
    attributes:
      value: |
        Do not paste API keys, private endpoints, customer data, or server IPs. Replace secrets with placeholders such as `sk-example`.
  - type: input
    id: command
    attributes:
      label: Command
      description: The sanitized command you ran.
      placeholder: claude ...
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Model
      placeholder: gpt-4o-mini or another OpenAI-compatible model
    validations:
      required: false
  - type: textarea
    id: error
    attributes:
      label: Error output
      description: Paste only sanitized error text.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Quick checks
      options:
        - label: I verified the account has available credits.
        - label: I verified a sanitized curl request works or fails the same way.
        - label: I removed all API keys and private data from this issue.
